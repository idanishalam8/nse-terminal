name: Keep Alive — Ping Every 5 Minutes

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping NSE Valuation Terminal
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            https://nse-valuation-terminal.streamlit.app/ || echo "000")
          echo "HTTP Status: $STATUS at $(date '+%Y-%m-%d %H:%M:%S UTC')"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]; then
            echo "APP IS AWAKE"
          else
            echo "APP WAKING UP (status: $STATUS)"
          fi
